// ── Supabase ──────────────────────────────────────────────────────────────────
async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function dbLoad(h) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tracker?pin=eq.${h}&select=data`,
    {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  if (!r.ok) throw new Error();
  const rows = await r.json();
  return rows.length ? rows[0].data : null;
}
async function dbSave(h, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tracker`, {
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
    body:JSON.stringify({pin:h,data,updated_at:new Date().toISOString()})
  });
  if (!r.ok) throw new Error();
}

function initChar(n){if(!appData[n])appData[n]={owned:false,races:{},titles:{}};}
function initials(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function getWins(n){
  const d=appData[n];if(!d)return 0;
  return Object.values(d.races||{}).filter(Boolean).length+Object.values(d.titles||{}).filter(Boolean).length;
}
function setSyncStatus(msg,cls){
  const el=document.getElementById("sync-status");
  el.textContent=msg;el.className="sync-status"+(cls?" "+cls:"");
}
function scheduleSave(){
  clearTimeout(saveTimer);setSyncStatus("Saving…","saving");
  saveTimer=setTimeout(async()=>{
    try{await dbSave(pinHash,appData);setSyncStatus("Saved to cloud ✓");}
    catch{setSyncStatus("Save failed — check connection","error");}
  },800);
}
 
// ── PIN ───────────────────────────────────────────────────────────────────────
document.getElementById("pin-btn").addEventListener("click",async()=>{
  const pin=document.getElementById("pin-input").value.trim();
  const errEl=document.getElementById("pin-error");
  if(!pin){errEl.textContent="Please enter a PIN.";errEl.style.display="block";return;}
  const btn=document.getElementById("pin-btn");
  btn.disabled=true;btn.textContent="Loading…";errEl.style.display="none";
  try{
    pinHash=await hashPin(pin);
    const saved=await dbLoad(pinHash);
    appData=saved||{};
    document.getElementById("pin-screen").style.display="none";
    document.getElementById("main-app").style.display="block";
    setSyncStatus(saved?"Loaded from cloud ✓":"New save — start tracking!");
    renderGrid();
  }catch{
    errEl.textContent="Could not connect. Check your internet and try again.";
    errEl.style.display="block";btn.disabled=false;btn.textContent="Load / create save";
  }
});

// ── Filters ───────────────────────────────────────────────────────────────────
function unique(arr){return[...new Set(arr)];}
 
const YEARS    = ["Junior","Classic","Senior"];
const SURFACES = ["Turf","Dirt"];
const GRADES   = ["G1","G2","G3"];
const MONTHS   = unique(G1_RACES.map(r=>r.month));
const LENGTHS  = ["Sprint","Mile","Medium","Long"]
 
function filteredRaces(){
  const q=fSearch.toLowerCase();
  return G1_RACES.filter(r=>{
    if(fGrade   && r.grade   !==fGrade)   return false;
    if(fYear    && r.year    !==fYear)    return false;
    if(fMonth   && r.month   !==fMonth)   return false;
    if(fSurface && r.surface !==fSurface) return false;
    if(fLength  && r.length  !==fLength)  return false;
    if(q && !r.name.toLowerCase().includes(q)) return false;
    return true;
  });
}
 
function hasActiveFilter(){
  return fSearch||fGrade||fYear||fMonth||fSurface||fLength;
}
 
function renderFilters(){
  const wrap=document.getElementById("d-filters");
  const chipRow=(label,options,current,setter)=>`
    <div class="filter-row">
      <span class="filter-label">${label}</span>
      ${options.map(o=>`<button class="filter-chip ${current===o?'active':''}" data-filter-label="${label}" data-filter-val="${o}">${o}${label==='Length'?'':''}</button>`).join("")}
    </div>`;
 
  wrap.innerHTML=`<div class="filters-wrap">
    <div class="filters-title">Filter races</div>
    <div class="filter-row">
      <span class="filter-label">Search</span>
      <input class="filter-search" id="f-search" placeholder="Race name…" value="${fSearch}" />
      ${hasActiveFilter()?`<button class="filter-clear" id="f-clear">Clear all</button>`:''}
    </div>
    ${chipRow("Grade",   GRADES,   fGrade,   v=>fGrade=v)}
    ${chipRow("Year",    YEARS,    fYear,    v=>fYear=v)}
    ${chipRow("Month",   MONTHS,   fMonth,   v=>fMonth=v)}
    ${chipRow("Surface", SURFACES, fSurface, v=>fSurface=v)}
    ${chipRow("Length",  LENGTHS,  fLength,  v=>fLength=v)}
  </div>`;
 
  document.getElementById("f-search").addEventListener("input",e=>{fSearch=e.target.value;renderDetailRaces(CHARS.find(x=>x.name===currentChar));renderFilters();});
  document.getElementById("f-clear")?.addEventListener("click",()=>{
    fSearch="";fGrade=null;fYear=null;fMonth=null;fSurface=null;fLength=null;
    renderDetailRaces(CHARS.find(x=>x.name===currentChar));renderFilters();
  });
 
  wrap.querySelectorAll(".filter-chip").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const val=btn.dataset.filterVal;
      const label=btn.dataset.filterLabel;
      if(label==="Grade")   fGrade  =(fGrade  ===val?null:val);
      if(label==="Year")    fYear   =(fYear   ===val?null:val);
      if(label==="Month")   fMonth  =(fMonth  ===val?null:val);
      if(label==="Surface") fSurface=(fSurface===val?null:val);
      if(label==="Length")  fLength =(fLength ===val?null:val);
      renderDetailRaces(CHARS.find(x=>x.name===currentChar));
      renderFilters();
    });
  });
}

function showDetail(name){
  currentChar=name;initChar(name);
  fSearch="";fGrade=null;fYear=null;fMonth=null;fSurface=null;fLength=null;
  document.getElementById("chars-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  const c=CHARS.find(x=>x.name===name);
  renderDetailHeader(c);

  renderDetailRaces(c);
  renderDetailTitles(c);
}

  document.getElementById("d-name").textContent=c.name;

  const ob=document.getElementById("d-own-btn");
  ob.textContent=d.owned?"✓ Owned":"Mark as owned";
  ob.className="own-btn-detail"+(d.owned?" owned":"");
  ob.onclick=()=>{d.owned=!d.owned;scheduleSave();renderDetailHeader(c);updateSummary();};
}

         <span class="tag tag-surface-${r.surface}">${r.surface}</span>
         <span class="tag tag-length">${r.length}</span>`;
}
